<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - RePro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px;
    }
    .auth-container {
      background: white; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      width: 100%; max-width: 460px; overflow: hidden;
    }
    .auth-header { padding: 32px 36px 12px; text-align: center; }
    .auth-logo { width: 72px; height: 84px; object-fit: contain; margin: 0 auto 16px; display: block; filter: drop-shadow(0 4px 12px rgba(0,115,234,0.2)); }
    .auth-title { font-size: 26px; font-weight: 800; color: #0d47a1; margin-bottom: 4px; }
    .auth-tagline { font-size: 14px; color: #676879; }
    .auth-subtitle { font-size: 15px; font-weight: 600; color: #1a1d2e; margin-top: 10px; }
    .auth-body { padding: 16px 36px 32px; }
    .auth-field { margin-bottom: 14px; }
    .auth-field label { display: block; font-size: 13px; font-weight: 600; color: #1a1d2e; margin-bottom: 6px; }
    .auth-input {
      width: 100%; padding: 11px 14px; border: 1.5px solid #e6e9ef; border-radius: 10px;
      background: #f5f6f8; font-size: 14px; font-weight: 500; transition: all 0.15s; font-family: inherit;
    }
    .auth-input:focus { outline: none; border-color: #0073ea; background: white; box-shadow: 0 0 0 3px rgba(0,115,234,0.12); }
    .auth-error {
      background: #fee; border: 1px solid #fca5a5; color: #e2445c; padding: 10px 14px;
      border-radius: 10px; font-size: 13px; text-align: center; font-weight: 500;
      display: none; margin-bottom: 14px;
    }
    .auth-error.visible { display: block; animation: shake 0.4s ease; }
    .auth-success {
      background: #e0f9ef; border: 1px solid #66e5b0; color: #007a3d; padding: 16px;
      border-radius: 10px; font-size: 14px; text-align: center; font-weight: 600;
      display: none; margin-bottom: 14px; line-height: 1.6;
    }
    .auth-success.visible { display: block; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    .auth-btn {
      width: 100%; padding: 13px; background: linear-gradient(135deg,#0073ea,#5559df); color: white;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer;
      transition: all 0.15s; box-shadow: 0 8px 20px rgba(0,115,234,0.35); margin-top: 4px;
    }
    .auth-btn:hover { transform: translateY(-1px); box-shadow: 0 12px 25px rgba(0,115,234,0.45); }
    .auth-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    .auth-link { text-align: center; margin-top: 18px; padding-top: 18px; border-top: 1px solid #e6e9ef; font-size: 13px; color: #676879; }
    .auth-link a { color: #0073ea; font-weight: 600; text-decoration: none; }
    .auth-link a:hover { text-decoration: underline; }
    .auth-invalid { text-align: center; padding: 40px 20px; }
    .auth-invalid-icon { font-size: 48px; margin-bottom: 16px; }
    .auth-invalid-text { font-size: 15px; font-weight: 600; color: #e2445c; margin-bottom: 8px; }
    .auth-invalid-desc { font-size: 13px; color: #676879; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-header">
      <img src="assets/logo.png" alt="RePro" class="auth-logo">
      <div class="auth-title">RePro</div>
      <div class="auth-tagline">Your Job Abroad</div>
      <div class="auth-subtitle">סיסמה חדשה</div>
    </div>
    <div class="auth-body">
      <form id="reset-form" onsubmit="return false">
        <div class="auth-error" id="reset-error"></div>
        <div class="auth-success" id="reset-success">הסיסמה שונתה בהצלחה! <a href="login.html" style="color:#007a3d;font-weight:700">להתחברות</a></div>
        <div id="reset-fields">
          <div class="auth-field">
            <label>סיסמה חדשה (לפחות 8 תווים)</label>
            <input type="password" id="reset-password" class="auth-input" required minlength="8" dir="ltr">
          </div>
          <div class="auth-field">
            <label>אישור סיסמה</label>
            <input type="password" id="reset-confirm" class="auth-input" required minlength="8" dir="ltr">
          </div>
          <button type="submit" class="auth-btn" id="reset-submit">שמור סיסמה חדשה</button>
        </div>
        <div id="reset-invalid" style="display:none">
          <div class="auth-invalid">
            <div class="auth-invalid-icon">🔗</div>
            <div class="auth-invalid-text">הקישור לא תקין או שפג תוקפו</div>
            <div class="auth-invalid-desc">ניתן לבקש קישור חדש בעמוד שכחתי סיסמה</div>
          </div>
        </div>
      </form>
      <div class="auth-link">
        <a href="forgot-password.html">שכחתי סיסמה</a> &middot; <a href="login.html">התחברות</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('reset-form');
    const errorEl = document.getElementById('reset-error');
    const successEl = document.getElementById('reset-success');
    const fieldsEl = document.getElementById('reset-fields');
    const invalidEl = document.getElementById('reset-invalid');
    const submitBtn = document.getElementById('reset-submit');

    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      fieldsEl.style.display = 'none';
      invalidEl.style.display = 'block';
    }

    async function doReset() {
      const password = document.getElementById('reset-password').value;
      const confirm = document.getElementById('reset-confirm').value;

      if (!password || password.length < 8) {
        showError('סיסמה חייבת להיות לפחות 8 תווים');
        return;
      }
      if (password !== confirm) {
        showError('הסיסמאות לא תואמות');
        return;
      }

      submitBtn.disabled = true;
      errorEl.classList.remove('visible');

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Reset failed');

        fieldsEl.style.display = 'none';
        successEl.classList.add('visible');
      } catch (err) {
        if (err.message.includes('expired') || err.message.includes('Invalid')) {
          fieldsEl.style.display = 'none';
          invalidEl.style.display = 'block';
        } else {
          showError(err.message);
          submitBtn.disabled = false;
        }
      }
    }

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.add('visible');
    }

    form.addEventListener('submit', doReset);
    if (token) document.getElementById('reset-password').focus();
  </script>
</body>
</html>
