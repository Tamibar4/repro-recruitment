<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RePro | מועמדים</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=5">
  <link rel="icon" type="image/png" href="assets/logo.png?v=2">
  <link rel="apple-touch-icon" href="assets/logo.png?v=2">
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="assets/logo.png" alt="RePro" class="sidebar-logo-img">
        <div class="sidebar-logo-text-block">
          <div class="sidebar-logo-text" data-i18n="app_name">RePro</div>
          <div class="sidebar-logo-tagline" data-i18n="app_tagline">Your Job Abroad</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="9"/>
            <rect x="14" y="3" width="7" height="5"/>
            <rect x="14" y="12" width="7" height="9"/>
            <rect x="3" y="16" width="7" height="5"/>
          </svg>
          <span data-i18n="dashboard">דשבורד</span>
        </a>
        <a href="jobs.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
          <span data-i18n="jobs">משרות</span>
        </a>
        <a href="candidates.html" class="nav-item active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="8.5" cy="7" r="4"/>
            <polyline points="17 11 19 13 23 9"/>
          </svg>
          <span data-i18n="candidates">מועמדים</span>
        </a>
        <a href="team.html" class="nav-item admin-only-nav" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <span>צוות</span>
        </a>
        <a href="admin.html" class="nav-item admin-only-nav" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <span>ניהול</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div id="user-badge-container"></div>
        <button id="lang-switch" class="lang-switch">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          English
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <div class="page-header">
        <div>
          <h1 class="page-title" data-i18n="candidates_title">מועמדים</h1>
          <div class="page-subtitle" data-i18n="candidates_subtitle">ניהול פייפליין המועמדים</div>
        </div>
        <button class="btn btn-primary" id="btn-new-candidate">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          <span data-i18n="new_candidate">מועמד חדש</span>
        </button>
      </div>

      <!-- Tabs -->
      <div class="page-tabs">
        <button class="page-tab active" data-tab="active">
          <span class="page-tab-icon">📋</span>
          <span>לידים פעילים</span>
        </button>
        <button class="page-tab" data-tab="delayed">
          <span class="page-tab-icon">⏳</span>
          <span>זמינות מאוחרת</span>
          <span class="page-tab-count" id="tab-delayed-count" style="display:none">0</span>
        </button>
      </div>

      <!-- TAB 1: Active Candidates -->
      <div id="tab-content-active" class="tab-content">

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="search-input">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <path d="M21 21l-4.35-4.35"/>
          </svg>
          <input type="text" id="search-input" data-i18n-placeholder="search_candidates" placeholder="חיפוש מועמד...">
        </div>
        <select class="filter-select" id="filter-category">
          <option value="all" data-i18n="all_categories">כל הקטגוריות</option>
          <option value="chimney" data-i18n="chimney">ארובות</option>
          <option value="air_duct" data-i18n="air_duct">ניקוי אוורור</option>
          <option value="garage_door" data-i18n="garage_door">דלתות חניה</option>
          <option value="construction" data-i18n="construction">בנייה</option>
          <option value="cosmetics" data-i18n="cosmetics">קוסמטיקה</option>
        </select>
        <select class="filter-select" id="filter-job">
          <option value="all" data-i18n="all_jobs">כל המשרות</option>
        </select>
      </div>

      <!-- Kanban Board -->
      <div class="kanban-board">
        <!-- Stage 1 -->
        <div class="kanban-column">
          <div class="kanban-header stage1">
            <div class="kanban-title">
              <span class="kanban-title-emoji">📞</span>
              <span data-i18n="stage1">שלב ראשון - שיחה איתי</span>
            </div>
            <span class="kanban-count" id="count-stage1">0</span>
          </div>
          <div class="kanban-body" id="column-stage1"></div>
        </div>

        <!-- Stage 2 -->
        <div class="kanban-column">
          <div class="kanban-header stage2">
            <div class="kanban-title">
              <span class="kanban-title-emoji">🤝</span>
              <span data-i18n="stage2">שלב שני - אצל המעסיק</span>
            </div>
            <span class="kanban-count" id="count-stage2">0</span>
          </div>
          <div class="kanban-body" id="column-stage2"></div>
        </div>

        <!-- Not Relevant -->
        <div class="kanban-column">
          <div class="kanban-header" style="background: linear-gradient(135deg, #9e9e9e, #bdbdbd);">
            <div class="kanban-title">
              <span class="kanban-title-emoji">❌</span>
              <span>לא רלוונטים</span>
            </div>
            <span class="kanban-count" id="count-rejected">0</span>
          </div>
          <div class="kanban-body" id="column-rejected"></div>
        </div>
      </div>

      <!-- Accepted candidates detailed table + monthly payment summary -->
      <div id="accepted-section" class="accepted-section" style="display:none">
        <div class="accepted-header">
          <div class="accepted-header-left">
            <span class="accepted-header-icon">🎯</span>
            <div>
              <div class="accepted-header-title">מועמדים שהתקבלו</div>
              <div class="accepted-header-subtitle" id="accepted-subtitle">0 מועמדים</div>
            </div>
          </div>
          <button class="btn btn-secondary btn-sm" id="btn-accepted-export" title="ייצוא לאקסל">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            ייצוא אקסל
          </button>
        </div>
        <div class="accepted-table-wrap">
          <table class="accepted-table" id="accepted-table"></table>
        </div>
        <!-- Monthly payment summary (moved here) -->
        <div id="payment-summary" class="payment-summary"></div>
      </div>

      </div><!-- end tab-content-active -->

      <!-- TAB 2: Delayed Availability -->
      <div id="tab-content-delayed" class="tab-content" style="display:none">
        <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
          <button class="btn btn-primary" id="btn-new-delayed">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            הוסף מועמד עם זמינות מאוחרת
          </button>
        </div>
        <div id="delayed-availability-container">
          <div class="empty-state"><div class="spinner"></div></div>
        </div>
      </div>

    </main>
  </div>

  <!-- Candidate Modal -->
  <div class="modal-overlay" id="candidate-modal" role="dialog" aria-modal="true" aria-labelledby="candidate-modal-title" aria-hidden="true">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="candidate-modal-title" data-i18n="new_candidate">מועמד חדש</h2>
        <button class="modal-close" onclick="closeModal('candidate-modal')" aria-label="סגור" data-i18n-aria-label="close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <form id="candidate-form" onsubmit="return false">
          <input type="hidden" id="candidate-id">
          <div class="form-grid">
            <div class="form-field">
              <label data-i18n="name">שם <span class="required">*</span></label>
              <input type="text" id="candidate-name" required>
            </div>
            <div class="form-field">
              <label data-i18n="phone">טלפון</label>
              <div class="phone-input-wrap">
                <input type="tel" id="candidate-phone" dir="ltr">
                <a id="candidate-phone-wa" class="phone-wa-btn hidden" target="_blank" rel="noopener" title="WhatsApp" aria-label="WhatsApp">
                  <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                  </svg>
                </a>
              </div>
            </div>
            <div class="form-field">
              <label data-i18n="email">אימייל</label>
              <input type="email" id="candidate-email" dir="ltr">
            </div>
            <div class="form-field">
              <label data-i18n="source">מקור</label>
              <input type="text" id="candidate-source" placeholder="LinkedIn, Indeed, ...">
            </div>
            <div class="form-field full">
              <label data-i18n="job">משרה</label>
              <select id="candidate-job">
                <option value="" data-i18n="select_job">בחרי משרה</option>
              </select>
            </div>
            <div class="form-field">
              <label data-i18n="stage">שלב</label>
              <select id="candidate-stage">
                <option value="stage1">שלב ראשון - שיחה איתי</option>
                <option value="stage2">שלב שני - שיחה עם המעסיק</option>
                <option value="accepted">התקבלו</option>
                <option value="rejected">לא רלוונטים</option>
                <option value="delayed">זמינות מאוחרת</option>
              </select>
            </div>
            <div class="form-field">
              <label data-i18n="call_date">תאריך שיחה</label>
              <input type="datetime-local" id="candidate-call-date">
            </div>
            <div class="form-field full">
              <label>תזכורת פולואפ</label>
              <div class="followup-quick-btns">
                <button type="button" class="followup-btn" data-days="1">מחר</button>
                <button type="button" class="followup-btn" data-days="3">עוד 3 ימים</button>
                <button type="button" class="followup-btn" data-days="7">עוד שבוע</button>
                <button type="button" class="followup-btn" data-days="14">עוד שבועיים</button>
                <button type="button" class="followup-btn" data-days="0">תאריך ידני</button>
              </div>
              <div id="followup-date-row" class="followup-date-row" style="display:none">
                <input type="datetime-local" id="candidate-follow-up">
                <button type="button" class="followup-clear-btn" id="followup-clear" title="נקה">✕</button>
              </div>
              <div id="followup-preview" class="followup-preview"></div>
            </div>
            <div class="form-field full">
              <label>זמינות מאוחרת - מתי המועמד זמין להתחיל?</label>
              <input type="month" id="candidate-available-from" placeholder="בחר חודש">
            </div>
            <div class="form-field full">
              <label data-i18n="call_summary">סיכום שיחה</label>
              <textarea id="candidate-summary" rows="4"></textarea>
            </div>

            <!-- Payment fields (visible for accepted candidates) -->
            <div id="payment-fields" class="form-field full" style="display:none">
              <div class="payment-section-title">💰 פרטי תשלום (למועמדים שהתקבלו)</div>
              <div class="form-grid" style="margin-top:10px">
                <div class="form-field">
                  <label>תאריך הגעה / התחלת עבודה</label>
                  <input type="date" id="candidate-start-date">
                </div>
                <div class="form-field">
                  <label>סכום כולל ($)</label>
                  <input type="number" id="candidate-payment-amount" min="0" step="1" dir="ltr" placeholder="0">
                </div>

                <!-- Payment plan selector -->
                <div class="form-field full">
                  <label>תוכנית תשלום</label>
                  <div class="payment-plan-options" id="payment-plan-options">
                    <button type="button" class="plan-btn" data-plan="45days">
                      <span class="plan-icon">📅</span>
                      <span class="plan-label">45 יום</span>
                      <span class="plan-desc">תשלום מלא אחרי 45 יום</span>
                    </button>
                    <button type="button" class="plan-btn" data-plan="2weeks">
                      <span class="plan-icon">⚡</span>
                      <span class="plan-label">שבועיים</span>
                      <span class="plan-desc">$500 אחרי שבועיים</span>
                    </button>
                    <button type="button" class="plan-btn" data-plan="5050">
                      <span class="plan-icon">✌️</span>
                      <span class="plan-label">50/50</span>
                      <span class="plan-desc">50% בנחיתה + 50% אחרי חודש</span>
                    </button>
                    <button type="button" class="plan-btn" data-plan="custom">
                      <span class="plan-icon">✏️</span>
                      <span class="plan-label">ידני</span>
                      <span class="plan-desc">הגדרה ידנית</span>
                    </button>
                  </div>
                </div>

                <!-- Calculated payment schedule (auto-filled) -->
                <div class="form-field full" id="payment-schedule-section" style="display:none">
                  <label>לוח תשלומים מחושב</label>
                  <div id="payment-schedule-display" class="payment-schedule-display"></div>
                </div>

                <!-- Hidden field to store full payment data -->
                <input type="hidden" id="candidate-payment-plan" value="">
                <input type="hidden" id="candidate-payment-date" value="">
              </div>
            </div>

            <div class="form-field full">
              <label data-i18n="notes">הערות</label>
              <textarea id="candidate-notes" rows="2"></textarea>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger" id="btn-delete-candidate" data-i18n="delete" style="margin-right: auto;">מחיקה</button>
        <button class="btn btn-secondary" onclick="closeModal('candidate-modal')" data-i18n="cancel">ביטול</button>
        <button class="btn btn-primary" id="btn-save-candidate" data-i18n="save">שמירה</button>
      </div>
    </div>
  </div>

  <script src="js/i18n.js?v=2"></script>
  <script src="js/api.js?v=2"></script>
  <script src="js/candidates.js?v=3"></script>
</body>
</html>
