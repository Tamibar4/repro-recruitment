<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RePro | התחברות</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="assets/logo.png?v=2">
  <link rel="apple-touch-icon" href="assets/logo.png?v=2">
  <!-- pwa-meta-injected -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#5e5ce6">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="RePro">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      width: 100%;
      max-width: 460px;
      overflow: hidden;
    }

    .login-header {
      padding: 36px 36px 16px;
      text-align: center;
    }

    .login-logo {
      width: 92px;
      height: 108px;
      object-fit: contain;
      margin: 0 auto 20px;
      display: block;
      filter: drop-shadow(0 8px 16px rgba(0, 115, 234, 0.25));
    }

    .login-title {
      font-size: 30px;
      font-weight: 800;
      color: #0d47a1;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .login-tagline {
      font-size: 14px;
      color: var(--color-text-secondary);
      margin-bottom: 8px;
    }

    .login-welcome {
      font-size: 16px;
      color: var(--color-text);
      font-weight: 600;
      margin-top: 12px;
    }

    .login-body {
      padding: 16px 36px 36px;
    }

    .login-field {
      margin-bottom: 16px;
    }

    .login-field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 7px;
    }

    .login-input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--color-border);
      border-radius: 10px;
      background: var(--color-bg);
      font-size: 15px;
      font-weight: 500;
      transition: all 0.15s;
      font-family: inherit;
    }

    .login-input:focus {
      outline: none;
      border-color: var(--color-primary);
      background: white;
      box-shadow: 0 0 0 3px rgba(0, 115, 234, 0.12);
    }

    .login-error {
      background: #fee;
      border: 1px solid #fca5a5;
      color: var(--color-red);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 14px;
      text-align: center;
      font-weight: 500;
      display: none;
    }

    .login-error.visible {
      display: block;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .login-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #0073ea, #5559df);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 8px 20px rgba(0, 115, 234, 0.35);
      margin-top: 8px;
    }

    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 25px rgba(0, 115, 234, 0.45);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .login-help {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--color-border);
      text-align: center;
      font-size: 12px;
      color: var(--color-text-light);
      line-height: 1.7;
    }

    .login-help strong {
      color: var(--color-text);
    }

    .login-links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e6e9ef;
    }

    .login-links a {
      color: #0073ea;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: color 0.15s;
    }

    .login-links a:hover {
      text-decoration: underline;
      color: #0060b9;
    }

    .login-link-sep {
      color: #c3c6d4;
      font-size: 14px;
    }

    .login-pending {
      background: #fff4e0;
      border: 1px solid #ffd789;
      color: #b87414;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      text-align: center;
      font-weight: 500;
      margin-top: 14px;
      line-height: 1.6;
    }

    .lang-toggle-floating {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .lang-toggle-floating:hover {
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <button class="lang-toggle-floating" id="lang-switch">English</button>

  <div class="login-container">
    <div class="login-header">
      <img src="assets/logo.png" alt="RePro" class="login-logo">
      <div class="login-title">RePro</div>
      <div class="login-tagline" data-i18n="app_tagline">Your Job Abroad</div>
      <div class="login-welcome" data-i18n="login_welcome">ברוכים הבאים - התחברו כדי להמשיך</div>
    </div>
    <div class="login-body">
      <form id="login-form" onsubmit="return false">
        <div class="login-error" id="login-error"></div>
        <div class="login-field">
          <label data-i18n="username">שם משתמש</label>
          <input type="text" id="username" class="login-input" autocomplete="username" required dir="ltr">
        </div>
        <div class="login-field">
          <label data-i18n="password">סיסמה</label>
          <input type="password" id="password" class="login-input" autocomplete="current-password" required dir="ltr">
        </div>
        <button type="submit" class="login-btn" id="login-submit" data-i18n="login_button">התחברות</button>
      </form>

      <div class="login-links">
        <a href="forgot-password.html" class="login-link-forgot">שכחתי סיסמה</a>
        <span class="login-link-sep">&middot;</span>
        <a href="signup.html" class="login-link-signup">הרשמה</a>
      </div>

      <div id="login-pending-msg" class="login-pending" style="display:none">
        ההרשמה שלך ממתינה לאישור מנהל. תקבל/י מייל כשהחשבון יאושר.
      </div>
    </div>
  </div>

  <script src="js/i18n.js?v=3"></script>
  <script>
    // If already logged in, redirect to dashboard
    const existingToken = localStorage.getItem('auth_token');
    if (existingToken) {
      fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + existingToken } })
        .then(r => r.ok ? window.location.href = '/' : null)
        .catch(() => {});
    }

    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('login-error');
    const submitBtn = document.getElementById('login-submit');

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) return;

      submitBtn.disabled = true;
      errorEl.classList.remove('visible');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const resData = await res.json().catch(() => ({}));
        if (!res.ok) {
          throw new Error(resData.error || 'Login failed');
        }
        const { token, user } = resData;
        localStorage.setItem('auth_token', token);
        localStorage.setItem('auth_user', JSON.stringify(user));
        window.location.href = '/';
      } catch (err) {
        if (err.message === 'pending') {
          document.getElementById('login-pending-msg').style.display = 'block';
          errorEl.classList.remove('visible');
        } else {
          errorEl.textContent = I18n.t('login_invalid');
          errorEl.classList.add('visible');
          document.getElementById('login-pending-msg').style.display = 'none';
        }
        submitBtn.disabled = false;
      }
    }

    form.addEventListener('submit', doLogin);
    submitBtn.addEventListener('click', doLogin);
    document.getElementById('username').focus();
  </script>

  <script src="/js/pwa.js?v=1"></script>
</body>
</html>
