<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RePro | שכחתי סיסמה</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="assets/logo.png?v=2">
  <link rel="apple-touch-icon" href="assets/logo.png?v=2">
  <!-- pwa-meta-injected -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#5e5ce6">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="RePro">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <style>
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px;
    }
    .auth-container {
      background: white; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      width: 100%; max-width: 460px; overflow: hidden;
    }
    .auth-header { padding: 32px 36px 12px; text-align: center; }
    .auth-logo { width: 72px; height: 84px; object-fit: contain; margin: 0 auto 16px; display: block; filter: drop-shadow(0 4px 12px rgba(0,115,234,0.2)); }
    .auth-title { font-size: 26px; font-weight: 800; color: #0d47a1; margin-bottom: 4px; }
    .auth-tagline { font-size: 14px; color: #676879; }
    .auth-subtitle { font-size: 15px; font-weight: 600; color: #1a1d2e; margin-top: 10px; }
    .auth-desc { font-size: 13px; color: #676879; margin-top: 8px; line-height: 1.6; }
    .auth-body { padding: 16px 36px 32px; }
    .auth-field { margin-bottom: 14px; }
    .auth-field label { display: block; font-size: 13px; font-weight: 600; color: #1a1d2e; margin-bottom: 6px; }
    .auth-input {
      width: 100%; padding: 11px 14px; border: 1.5px solid #e6e9ef; border-radius: 10px;
      background: #f5f6f8; font-size: 14px; font-weight: 500; transition: all 0.15s; font-family: inherit;
    }
    .auth-input:focus { outline: none; border-color: #0073ea; background: white; box-shadow: 0 0 0 3px rgba(0,115,234,0.12); }
    .auth-error {
      background: #fee; border: 1px solid #fca5a5; color: #e2445c; padding: 10px 14px;
      border-radius: 10px; font-size: 13px; text-align: center; font-weight: 500;
      display: none; margin-bottom: 14px;
    }
    .auth-error.visible { display: block; animation: shake 0.4s ease; }
    .auth-success {
      background: #e0f9ef; border: 1px solid #66e5b0; color: #007a3d; padding: 16px;
      border-radius: 10px; font-size: 14px; text-align: center; font-weight: 600;
      display: none; margin-bottom: 14px; line-height: 1.6;
    }
    .auth-success.visible { display: block; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    .auth-btn {
      width: 100%; padding: 13px; background: linear-gradient(135deg,#0073ea,#5559df); color: white;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer;
      transition: all 0.15s; box-shadow: 0 8px 20px rgba(0,115,234,0.35); margin-top: 4px;
    }
    .auth-btn:hover { transform: translateY(-1px); box-shadow: 0 12px 25px rgba(0,115,234,0.45); }
    .auth-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    .auth-link { text-align: center; margin-top: 18px; padding-top: 18px; border-top: 1px solid #e6e9ef; font-size: 13px; color: #676879; }
    .auth-link a { color: #0073ea; font-weight: 600; text-decoration: none; }
    .auth-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-header">
      <img src="assets/logo.png" alt="RePro" class="auth-logo">
      <div class="auth-title">RePro</div>
      <div class="auth-tagline">Your Job Abroad</div>
      <div class="auth-subtitle">שכחתי סיסמה</div>
      <div class="auth-desc">הכניסו את כתובת האימייל ונשלח לכם קישור לאיפוס הסיסמה</div>
    </div>
    <div class="auth-body">
      <form id="forgot-form" data-no-submit>
        <div class="auth-error" id="forgot-error"></div>
        <div class="auth-success" id="forgot-success">נשלח! אם כתובת האימייל רשומה במערכת, תקבלו קישור לאיפוס סיסמה.</div>
        <div id="forgot-fields">
          <div class="auth-field">
            <label>אימייל</label>
            <input type="email" id="forgot-email" class="auth-input" required dir="ltr" placeholder="your@email.com">
          </div>
          <button type="submit" class="auth-btn" id="forgot-submit">שלח קישור לאיפוס</button>
        </div>
      </form>
      <div class="auth-link">
        <a href="login.html">חזרה להתחברות</a>
      </div>
      <div class="auth-legal" style="margin-top:18px;text-align:center;font-size:12.5px;color:#6b7280">
        <a href="/privacy" style="color:#6b7280;text-decoration:underline">מדיניות פרטיות</a>
        <span>&middot;</span>
        <a href="/terms" style="color:#6b7280;text-decoration:underline">תנאי שימוש</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('forgot-form');
    const errorEl = document.getElementById('forgot-error');
    const successEl = document.getElementById('forgot-success');
    const fieldsEl = document.getElementById('forgot-fields');
    const submitBtn = document.getElementById('forgot-submit');

    async function doForgot() {
      const email = document.getElementById('forgot-email').value.trim();
      if (!email) return;

      submitBtn.disabled = true;
      errorEl.classList.remove('visible');

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed');

        fieldsEl.style.display = 'none';
        successEl.classList.add('visible');
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('visible');
        submitBtn.disabled = false;
      }
    }

    form.addEventListener('submit', doForgot);
    document.getElementById('forgot-email').focus();
  </script>

  <script src="js/ui-handlers.js?v=1"></script>
  <script src="js/consent-banner.js?v=1"></script>
  <script src="/js/pwa.js?v=1"></script>
</body>
</html>
